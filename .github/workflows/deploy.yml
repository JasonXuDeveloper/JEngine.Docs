name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 25

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Restore React Router build cache
        uses: actions/cache@v4
        with:
          path: |
            .react-router
            node_modules/.vite
          key: vite-${{ runner.os }}-${{ hashFiles('bun.lock') }}-${{ hashFiles('content/**', 'src/**', 'app/**') }}
          restore-keys: |
            vite-${{ runner.os }}-${{ hashFiles('bun.lock') }}-
            vite-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static site
        run: bun run build
        env:
          VITE_ALGOLIA_APP_ID: ${{ secrets.NEXT_PUBLIC_ALGOLIA_APP_ID }}
          VITE_ALGOLIA_SEARCH_API_KEY: ${{ secrets.NEXT_PUBLIC_ALGOLIA_SEARCH_API_KEY }}
          VITE_ALGOLIA_INDEX_NAME: ${{ secrets.NEXT_PUBLIC_ALGOLIA_INDEX_NAME }}

      - name: Sync Algolia search
        run: bun run search:sync
        env:
          VITE_ALGOLIA_APP_ID: ${{ secrets.NEXT_PUBLIC_ALGOLIA_APP_ID }}
          VITE_ALGOLIA_INDEX_NAME: ${{ secrets.NEXT_PUBLIC_ALGOLIA_INDEX_NAME }}
          ALGOLIA_ADMIN_API_KEY: ${{ secrets.ALGOLIA_ADMIN_API_KEY }}

      - name: Deploy to Cloudflare Pages
        run: wrangler pages deploy build/client --project-name jengine
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Submit IndexNow
        run: bun run indexnow
